# mise configuration for pjangler
# https://mise.jdx.dev/configuration.html

[env]
# .mise/scripts for repo tooling; agents/hermes/pm puts the PM hermes wrapper
# on PATH (33god standard contract — the repo's PM owns the ticket board).
_.path = [".mise/scripts", "agents/hermes/pm", "agents/hermes/pm/hermes"]
_.file = [".env"]
# This block will handle the linking of
# agent files to the main AGENTS.md file.
#
# TODO: Ensure this works for all levels of nesting.
# i.e. All linked agent files MUST be siblings at
# any given level of nesting.
[hooks]
enter = [
  "{{config_root}}/.mise/scripts/link-agentfiles.sh",
  "op inject -i .env.op > .env",
]

[[watch_files]]
patterns = ["AGENTS.md"]
task = "link-agentfiles"

[tasks.link-agentfiles]
description = "Symlink all agent files to AGENTS.md"
run = "{{config_root}}/.mise/scripts/link-agentfiles.sh"

[tasks."fleet:check"]
description = "Report Hermes fleet drift (wrappers, profile contract, registry symlinks)"
run = "{{config_root}}/templates/hermes-agent/scripts/fleet-sync.sh"

[tasks."fleet:sync"]
description = "Reconcile every deployed Hermes agent with the current template + fleet contract"
run = "{{config_root}}/templates/hermes-agent/scripts/fleet-sync.sh --apply"

# Backfill: discover every git repo under a root dir and register each as a
# formal pjangler project (writes the canonical .project.json). Dry-run by
# default; pass --apply to write, --plane to also register in Plane.
#   mise run projects:backfill -- /home/delorenj/code
#   mise run projects:backfill -- /home/delorenj/code --apply
[tasks."projects:backfill"]
description = "Scan a root dir for git repos and register each as a formal pjangler project (dry-run unless --apply)"
alias = "projects:register"
run = "{{config_root}}/.mise/scripts/backfill-projects.sh"

# >>> mise-versioning >>>  (managed block — do not edit by hand; re-run init to update)
[tasks."version"]
description = "Print the current version (vX.Y.Z)"
run = "{{config_root}}/.mise/scripts/versioning.sh current"

[tasks."version:bump"]
description = "Bump patch version: vX.Y.Z -> vX.Y.(Z+1)"
alias = "version:bump-patch"
run = "{{config_root}}/.mise/scripts/versioning.sh bump patch"

[tasks."version:bump-minor"]
description = "Bump minor version: vX.Y.Z -> vX.(Y+1).0"
run = "{{config_root}}/.mise/scripts/versioning.sh bump minor"

[tasks."version:bump-major"]
description = "Bump major version: vX.Y.Z -> v(X+1).0.0"
run = "{{config_root}}/.mise/scripts/versioning.sh bump major"

[tasks."version:check"]
description = "Verify every versioned file is in parity"
run = "{{config_root}}/.mise/scripts/versioning.sh check"

[tasks."version:sync"]
description = "Force every versioned file up to the highest version"
run = "{{config_root}}/.mise/scripts/versioning.sh sync"
# <<< mise-versioning <<<

# --- npm lifecycle wrappers (plain node package; npm is the only PM here) ---

[tasks.install]
description = "Install dependencies with npm (the only package manager for this repo)"
run = "npm install"

# Build BOTH shipped artifacts (the pjangler CLI and the MCP server) so they stay
# on the same version. Use `mise run build` instead of `npm run build`.
[tasks.build]
description = "Build the CLI and MCP server bundles (esbuild via npm)"
run = "npm run build"

[tasks.typecheck]
description = "Type-check the source with tsc --noEmit"
run = "npm run typecheck"

# Cut a release in ONE commit: gate (build+test) -> bump -> commit -> tag the
# commit -> publish -> push. This is the task you want for shipping a new
# version — it owns the bump so you never commit twice. Level defaults to patch.
#   mise run release            # patch
#   mise run release minor      # or major
#   mise run release -- --dry-run   # gates + intent only, mutates nothing
[tasks.release]
description = "Cut a release: build+test, bump [patch|minor|major], one commit, tag it, publish, push"
run = "{{config_root}}/.mise/scripts/release.sh"

# Publish the CURRENT package.json version as-is (NO bump). `release` is the
# normal path; use this only to re-push an already-bumped version.
[tasks.publish]
description = "Publish the current version to npm as-is, no bump (use `mise run release` to cut a version)"
depends = ["build"]
run = [
  "test -f {{config_root}}/templates/commonproject/copier.yml || { echo 'templates/ submodules not initialized; run: git submodule update --init --recursive'; exit 1; }",
  # --otp resolved at publish time; a TOTP can't be injected statically via env/.npmrc
  "npm publish --access public --otp=\"$(op item get NPM --vault DeLoSecrets --otp)\"",
]

[tasks.mcp]
description = "Run the pjangler MCP server from the built bundle"
run = "npm run mcp"

[tools]
node = "26.4"
