# mise configuration for pjangler
# https://mise.jdx.dev/configuration.html

[env]
# .mise/scripts for repo tooling; agents/hermes/pm puts the PM hermes wrapper
# on PATH (33god standard contract — the repo's PM owns the ticket board).
_.path = [".mise/scripts", "agents/hermes/pm"]
_.file = [".env"]
# Auto-activate a Python venv when one exists at ./.venv.
# `create = false` means mise will not create one on its own.
_.python.venv = { path = ".venv", create = false }
CODEX_HOME = { value = ".codex", path = true }

# This block will handle the linking of
# agent files to the main AGENTS.md file.
#
# TODO: Ensure this works for all levels of nesting.
# i.e. All linked agent files MUST be siblings at
# any given level of nesting.
[hooks]
enter = "{{config_root}}/.mise/scripts/link-agentfiles.sh"

[[watch_files]]
patterns = ["AGENTS.md"]
task = "link-agentfiles"

[tasks.link-agentfiles]
description = "Symlink all agent files to AGENTS.md"
run = "{{config_root}}/.mise/scripts/link-agentfiles.sh"

# >>> mise-versioning >>>  (managed block — do not edit by hand; re-run init to update)
[tasks."version"]
description = "Print the current version (vX.Y.Z)"
run = "{{config_root}}/.mise/scripts/versioning.sh current"

[tasks."version:bump"]
description = "Bump patch version: vX.Y.Z -> vX.Y.(Z+1)"
alias = "version:bump-patch"
run = "{{config_root}}/.mise/scripts/versioning.sh bump patch"

[tasks."version:bump-minor"]
description = "Bump minor version: vX.Y.Z -> vX.(Y+1).0"
run = "{{config_root}}/.mise/scripts/versioning.sh bump minor"

[tasks."version:bump-major"]
description = "Bump major version: vX.Y.Z -> v(X+1).0.0"
run = "{{config_root}}/.mise/scripts/versioning.sh bump major"

[tasks."version:check"]
description = "Verify every versioned file is in parity"
run = "{{config_root}}/.mise/scripts/versioning.sh check"

[tasks."version:sync"]
description = "Force every versioned file up to the highest version"
run = "{{config_root}}/.mise/scripts/versioning.sh sync"
# <<< mise-versioning <<<

# --- npm lifecycle wrappers (plain node package; npm is the only PM here) ---

[tasks.install]
description = "Install dependencies with npm (the only package manager for this repo)"
run = "npm install"

# Version-aware build: bump patch once, then build BOTH shipped artifacts
# (the pjangler CLI and the MCP server) so they stay on the same version.
# Use `mise run build` instead of `npm run build` to get the bump + git tag.
[tasks.build]
description = "Bump patch, then build the CLI and MCP server bundles (esbuild via npm)"
depends = ["version:bump-patch"]
run = "npm run build"

[tasks.typecheck]
description = "Type-check the source with tsc --noEmit"
run = "npm run typecheck"

[tasks.publish]
description = "Bump + build (via depends), verify templates, publish to npm"
depends = ["build"]
run = [
  "test -f {{config_root}}/templates/commonproject/copier.yml || { echo 'templates/ submodules not initialized; run: git submodule update --init --recursive'; exit 1; }",
  "npm publish --access public",
]

[tasks.mcp]
description = "Run the pjangler MCP server from the built bundle"
run = "npm run mcp"
